<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Agents - Sécurité</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
        }
        .footer-buttons {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        .btn-back {
            background: rgba(148,163,184,0.2);
            color: #cbd5e1;
            border: 1px solid rgba(148,163,184,0.3);
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 14px;
            width: auto;
        }
        .btn-back:hover {
            background: rgba(148,163,184,0.3);
            transform: translateY(-2px);
            color: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            width: auto;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(6,182,212,0.3);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
        }
        .stat-card i {
            font-size: 36px;
            margin-bottom: 12px;
            display: inline-block;
        }
        .stat-card h3 {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: white;
        }
        .table-container {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .table-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .table-header-row h3 {
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }
        .search-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            width: 250px;
            outline: none;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.4); }
        .search-input:focus { border-color: #06b6d4; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 14px 20px;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 12px 20px;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .role-badge-admin {
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .role-badge-agent {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-action {
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            color: #60a5fa;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 3px;
            font-size: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
            width: auto;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-action:hover { background: rgba(59,130,246,0.3); transform: translateY(-1px); }
        .btn-danger { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #f87171; }
        .btn-danger:hover { background: rgba(239,68,68,0.3); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 28px;
            padding: 28px 32px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .modal-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-content h3 i { color: #06b6d4; }
        .modal-content .form-group { margin-bottom: 18px; }
        .modal-content .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
        .modal-content .form-group input,
        .modal-content .form-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            box-sizing: border-box;
        }
        .modal-content .form-group input:focus,
        .modal-content .form-group select:focus { border-color: #06b6d4; }
        .modal-content .form-group select option { background: #1e293b; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn-submit-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
            width: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit-cancel {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
            width: auto;
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; gap: 16px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="top-bar">
            <div class="top-bar-left" style="display:flex;align-items:center;gap:14px;">
                <img src="logo.png" alt="Logo ANSI" class="ansi-logo" onerror="this.style.display='none'">
                <h1>Gestion des Agents</h1>
            </div>
            <div class="user-info">
                <span class="role-badge" id="roleBadge"></span>
                <i class="fas fa-user-circle"></i>
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()"
                    style="width:auto;padding:8px 16px;font-size:13px;">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </button>
            </div>
        </div>

        <div class="page-header">
            <h2><i class="fas fa-shield-alt"></i> Gestion des agents</h2>
            <button class="btn-primary" onclick="openAddModal()">
                <i class="fas fa-plus-circle"></i> Nouvel agent
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-users" style="color:#3b82f6;"></i>
                <h3>TOTAL AGENTS</h3>
                <div class="number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-crown" style="color:#a855f7;"></i>
                <h3>ADMINISTRATEURS</h3>
                <div class="number" id="totalAdmins">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-shield-alt" style="color:#06b6d4;"></i>
                <h3>AGENTS SÉCURITÉ</h3>
                <div class="number" id="totalAgents">0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header-row">
                <h3><i class="fas fa-list"></i> Liste des agents</h3>
                <input type="text" class="search-input" id="searchUser"
                    placeholder="Rechercher par nom, login..."
                    autocomplete="off"
                    oninput="filterUsers()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom & Prénom</th>
                        <th>Login</th>
                        <th>Rôle</th>
                        <th>Date création</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersBody"></tbody>
            </table>
        </div>

        <div class="footer-buttons">
            <button class="btn-back" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i> Retour au Dashboard
            </button>
        </div>
    </div>

    <!-- MODAL AJOUTER -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-user-plus"></i> Ajouter un agent</h3>
            <div class="form-group">
                <label>Nom *</label>
                <input type="text" id="add_nom" placeholder="Nom" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Prénom *</label>
                <input type="text" id="add_prenom" placeholder="Prénom" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Login (identifiant) *</label>
                <input type="text" id="add_login" placeholder="ex: agent.diallo" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Mot de passe *</label>
                <input type="password" id="add_password" placeholder="Mot de passe" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select id="add_role">
                    <option value="agent">Agent de sécurité</option>
                    <option value="admin">Administrateur</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-submit-success" onclick="ajouterUtilisateur()">
                    <i class="fas fa-save"></i> Créer
                </button>
                <button class="btn-submit-cancel" onclick="closeAddModal()">Annuler</button>
            </div>
        </div>
    </div>

    <!-- MODAL MODIFIER -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-edit"></i> Modifier l'agent</h3>
            <input type="hidden" id="edit_id">
            <div class="form-group">
                <label>Nom *</label>
                <input type="text" id="edit_nom" placeholder="Nom" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Prénom *</label>
                <input type="text" id="edit_prenom" placeholder="Prénom" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Login *</label>
                <input type="text" id="edit_login" placeholder="Login" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select id="edit_role">
                    <option value="agent">Agent de sécurité</option>
                    <option value="admin">Administrateur</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" id="edit_password" placeholder="Laisser vide pour ne pas changer" autocomplete="new-password">
            </div>
            <div class="modal-buttons">
                <button class="btn-submit-success" onclick="modifierUtilisateur()">
                    <i class="fas fa-save"></i> Modifier
                </button>
                <button class="btn-submit-cancel" onclick="closeEditModal()">Annuler</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentUser = null;
        let usersList   = [];

        async function checkAuthAndLoad() {
            const token = checkAuth();
            if (!token) return;

            currentUser = getUser();

            document.getElementById('userName').textContent =
                `${currentUser.prenom || ''} ${currentUser.nom || ''}`.trim()
                || currentUser.login || 'Utilisateur';

            const badge = document.getElementById('roleBadge');
            if (currentUser.role === 'admin') {
                badge.textContent = '👑 Administrateur';
                badge.style.background = 'linear-gradient(135deg,#6c63ff,#a855f7)';
            } else {
                badge.textContent = '🛡️ Agent de sécurité';
                badge.style.background = 'linear-gradient(135deg,#06b6d4,#0891b2)';
            }
            badge.style.color = '#fff';

            if (currentUser.role !== 'admin') {
                alert('Accès réservé aux administrateurs');
                window.location.href = 'dashboard.html';
                return;
            }

            await loadUsers();
        }

        async function loadUsers() {
            try {
                const response = await apiRequest('http://localhost:3000/api/auth/users');

                if (!response.ok) {
                    showTableError('Erreur lors du chargement des agents');
                    return;
                }

                usersList = await response.json();

                document.getElementById('totalUsers').textContent    = usersList.length;
                document.getElementById('totalAdmins').textContent   = usersList.filter(u => u.role === 'admin').length;
                document.getElementById('totalAgents').textContent = usersList.filter(u => u.role === 'agent').length;

                document.getElementById('searchUser').value = '';
                renderTable(usersList);

            } catch (error) {
                console.error('Erreur loadUsers:', error);
                showTableError('Erreur de connexion au serveur');
            }
        }

        function showTableError(msg) {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:#f87171;">${msg}</td></tr>`;
        }

        function renderTable(users) {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';

            if (!users || users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;opacity:0.5;">Aucun agent trouvé</td></tr>`;
                return;
            }

            users.forEach(u => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = u.id;
                row.insertCell(1).textContent = `${u.prenom || ''} ${u.nom || ''}`.trim() || '—';
                row.insertCell(2).textContent = u.login || '—';

                const isAdmin = u.role === 'admin';
                row.insertCell(3).innerHTML = isAdmin
                    ? '<span class="role-badge-admin"><i class="fas fa-crown"></i> Admin</span>'
                    : '<span class="role-badge-agent"><i class="fas fa-shield-alt"></i> Agent</span>';

                row.insertCell(4).textContent = u.created_at
                    ? new Date(u.created_at).toLocaleDateString('fr-FR') : '—';

                const actCell = row.insertCell(5);
                actCell.innerHTML = `
                    <button class="btn-action" onclick="openEditModal(${u.id})">
                        <i class="fas fa-edit"></i> Modifier
                    </button>
                    ${u.id !== currentUser?.id ? `
                    <button class="btn-action btn-danger" onclick="deleteUser(${u.id})">
                        <i class="fas fa-trash"></i> Supprimer
                    </button>` : ''}`;
            });
        }

        function filterUsers() {
            const q = document.getElementById('searchUser').value.toLowerCase().trim();
            if (!q) { renderTable(usersList); return; }
            const filtered = usersList.filter(u =>
                (u.nom    || '').toLowerCase().includes(q) ||
                (u.prenom || '').toLowerCase().includes(q) ||
                (u.login  || '').toLowerCase().includes(q)
            );
            renderTable(filtered);
        }

        function openAddModal() {
            document.getElementById('add_nom').value      = '';
            document.getElementById('add_prenom').value   = '';
            document.getElementById('add_login').value    = '';
            document.getElementById('add_password').value = '';
            document.getElementById('add_role').value     = 'agent';
            document.getElementById('addModal').style.display = 'flex';
        }

        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
        }

        async function ajouterUtilisateur() {
            const nom          = document.getElementById('add_nom').value.trim();
            const prenom       = document.getElementById('add_prenom').value.trim();
            const login        = document.getElementById('add_login').value.trim();
            const mot_de_passe = document.getElementById('add_password').value;
            const role         = document.getElementById('add_role').value;

            if (!nom || !prenom || !login || !mot_de_passe) {
                alert('Veuillez remplir tous les champs obligatoires');
                return;
            }

            try {
                const res = await apiRequest('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ nom, prenom, login, mot_de_passe, role })
                });

                if (res.ok) {
                    closeAddModal();
                    await loadUsers();
                    alert('✅ Agent créé avec succès');
                } else {
                    const err = await res.json();
                    alert('❌ Erreur: ' + (err.message || 'Erreur lors de la création'));
                }
            } catch (err) {
                alert('❌ Erreur de connexion');
            }
        }

        function openEditModal(id) {
            const user = usersList.find(u => u.id === parseInt(id));
            if (!user) { alert('Agent non trouvé'); return; }

            document.getElementById('edit_id').value       = user.id;
            document.getElementById('edit_nom').value      = user.nom    || '';
            document.getElementById('edit_prenom').value   = user.prenom || '';
            document.getElementById('edit_login').value    = user.login  || '';
            document.getElementById('edit_password').value = '';

            const roleSelect = document.getElementById('edit_role');
            if (user.role === 'admin') {
                roleSelect.value = 'admin';
            } else {
                roleSelect.value = 'agent';
            }

            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function modifierUtilisateur() {
            const id = document.getElementById('edit_id').value;
            const nom = document.getElementById('edit_nom').value.trim();
            const prenom = document.getElementById('edit_prenom').value.trim();
            const login = document.getElementById('edit_login').value.trim();
            const role = document.getElementById('edit_role').value;
            const mdp = document.getElementById('edit_password').value;

            if (!nom || !prenom || !login) {
                alert('Veuillez remplir les champs nom, prénom et login');
                return;
            }

            const data = { nom, prenom, login, role };
            if (mdp && mdp.trim() !== '') {
                data.mot_de_passe = mdp;
            }

            console.log('📤 Envoi modification:', data);

            try {
                const response = await fetch(`http://localhost:3000/api/auth/users/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeEditModal();
                    await loadUsers();
                    alert('✅ Agent modifié avec succès');
                } else {
                    const err = await response.json();
                    console.error('Erreur réponse:', err);
                    alert('❌ Erreur: ' + (err.message || 'Erreur lors de la modification'));
                }
            } catch (err) {
                console.error('Erreur réseau:', err);
                alert('❌ Erreur de connexion');
            }
        }

        async function deleteUser(id) {
            if (!confirm('Supprimer cet agent ?')) return;

            try {
                const res = await apiRequest(`http://localhost:3000/api/auth/users/${id}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    await loadUsers();
                    alert('✅ Agent supprimé');
                } else {
                    const err = await res.json();
                    alert('❌ ' + (err.message || 'Erreur lors de la suppression'));
                }
            } catch (err) {
                alert('❌ Erreur de connexion');
            }
        }

        checkAuthAndLoad();
    </script>
</body>
</html>
