<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ANSI Niger</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .register-box {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .register-box h1 {
            font-size: 24px;
            font-weight: 700;
            color: #06b6d4;
            text-align: center;
            margin-bottom: 8px;
        }
        .register-box h2 {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
        }
        .form-group label i { margin-right: 8px; color: #06b6d4; }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: #06b6d4;
        }
        .btn-submit {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 15px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-back {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-family: 'Outfit', sans-serif;
        }
        .btn-back:hover { background: rgba(255,255,255,0.12); }
        .message {
            margin-top: 16px;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
        }
        .message-success {
            background: rgba(16,185,129,0.15);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.3);
        }
        .message-error {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }
        .login-link a {
            color: #06b6d4;
            text-decoration: none;
        }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <div style="text-align: center; margin-bottom: 20px;">
                <i class="fas fa-user-plus" style="font-size: 48px; color: #06b6d4;"></i>
            </div>
            <h1>Inscription</h1>
            <h2>Créez votre compte agent de sécurité</h2>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Nom *</label>
                <input type="text" id="nom" placeholder="Votre nom">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Prénom *</label>
                <input type="text" id="prenom" placeholder="Votre prénom">
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> Login (identifiant) *</label>
                <input type="text" id="login" placeholder="Choisissez un identifiant">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Mot de passe *</label>
                <input type="password" id="mot_de_passe" placeholder="Choisissez un mot de passe">
            </div>

            <button class="btn-submit" onclick="inscription()">
                <i class="fas fa-check-circle"></i> S'inscrire
            </button>

            <div class="login-link">
                Déjà un compte ? <a href="index.html">Se connecter</a>
            </div>

            <div id="message" style="display: none;" class="message"></div>
        </div>
    </div>

    <script>
        async function inscription() {
            const nom = document.getElementById('nom').value.trim();
            const prenom = document.getElementById('prenom').value.trim();
            const login = document.getElementById('login').value.trim();
            const mot_de_passe = document.getElementById('mot_de_passe').value;

            const messageDiv = document.getElementById('message');
            
            if (!nom || !prenom || !login || !mot_de_passe) {
                messageDiv.textContent = '❌ Tous les champs sont obligatoires';
                messageDiv.className = 'message message-error';
                messageDiv.style.display = 'block';
                return;
            }

            if (mot_de_passe.length < 4) {
                messageDiv.textContent = '❌ Le mot de passe doit comporter au moins 4 caractères';
                messageDiv.className = 'message message-error';
                messageDiv.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nom: nom,
                        prenom: prenom,
                        login: login,
                        mot_de_passe: mot_de_passe,
                        role: 'agent'
                    })
                });

                if (res.ok) {
                    messageDiv.textContent = '✅ Inscription réussie ! Vous pouvez maintenant vous connecter.';
                    messageDiv.className = 'message message-success';
                    messageDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    const error = await res.json();
                    messageDiv.textContent = '❌ Erreur : ' + (error.message || 'Inscription impossible');
                    messageDiv.className = 'message message-error';
                    messageDiv.style.display = 'block';
                }
            } catch (err) {
                messageDiv.textContent = '❌ Erreur de connexion au serveur';
                messageDiv.className = 'message message-error';
                messageDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
