<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Visiteurs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-header h2 { font-size: 1.5rem; font-weight: 600; color: white; }
        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(6,182,212,0.3); }
        .footer-buttons { display: flex; justify-content: center; margin-top: 30px; margin-bottom: 20px; }
        .btn-back {
            background: rgba(148,163,184,0.2);
            color: #cbd5e1;
            border: 1px solid rgba(148,163,184,0.3);
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 14px;
        }
        .btn-back:hover { background: rgba(148,163,184,0.3); transform: translateY(-2px); color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
        }
        .stat-card i { font-size: 36px; margin-bottom: 12px; display: inline-block; }
        .stat-card h3 { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
        .stat-card .number { font-size: 32px; font-weight: 700; color: white; }
        .stat-card i.icon-visitors { color: #8b5cf6; }
        .stat-card i.icon-present  { color: #10b981; }
        .stat-card i.icon-exit     { color: #f59e0b; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .search-input {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            width: 250px;
            margin-right: 10px;
        }
        .btn-refresh {
            background: rgba(6,182,212,0.2);
            border: 1px solid rgba(6,182,212,0.3);
            color: #06b6d4;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn i { font-size: 16px; }
        .tab-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .tab-btn.active {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: white;
        }
        .actions-cell { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .btn-edit {
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            color: #60a5fa;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-edit:hover { background: rgba(59,130,246,0.3); transform: translateY(-1px); }
        .btn-delete {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-delete:hover  { background: rgba(239,68,68,0.3); transform: translateY(-1px); }
        .btn-delete:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        .btn-restore {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.3);
            color: #10b981;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-restore:hover { background: rgba(16,185,129,0.3); transform: translateY(-1px); }
        .btn-sortie-action {
            background: rgba(245,158,11,0.15);
            border: 1px solid rgba(245,158,11,0.3);
            color: #fbbf24;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-sortie-action:hover { background: rgba(245,158,11,0.3); transform: translateY(-1px); }
        @keyframes rowFadeOut {
            0%   { opacity: 1; transform: translateX(0); background: transparent; }
            30%  { background: rgba(239,68,68,0.08); }
            100% { opacity: 0; transform: translateX(50px); background: rgba(239,68,68,0.04); }
        }
        .row-deleting {
            animation: rowFadeOut 0.4s ease forwards;
            pointer-events: none;
        }
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            color: #fff;
            padding: 14px 22px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            z-index: 9999;
            animation: toastIn 0.3s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.45);
            max-width: 340px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success { background: linear-gradient(135deg,#10b981,#059669); }
        .toast.error   { background: linear-gradient(135deg,#ef4444,#dc2626); }
        .toast.info    { background: linear-gradient(135deg,#06b6d4,#0891b2); }
        @keyframes toastIn {
            from { transform: translateX(110%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .form-row   { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="top-bar">
            <div class="top-bar-left">
                <img src="logo.png" alt="Logo ANSI" class="ansi-logo" onerror="this.style.display='none'">
                <h1>Gestion des Visiteurs</h1>
            </div>
            <div class="user-info">
                <span class="role-badge" id="roleBadge"></span>
                <i class="fas fa-user-circle"></i>
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </button>
            </div>
        </div>

        <div class="page-header">
            <h2><i class="fas fa-users"></i> Gestion des visiteurs</h2>
            <button class="btn-primary" onclick="openModal()">
                <i class="fas fa-plus-circle"></i> Nouveau visiteur
            </button>
        </div>

        <!-- ✅ Tabs : visible seulement pour admin (géré dans loadUserInfo) -->
        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" onclick="switchTab('active')">
                <i class="fas fa-users"></i> Visiteurs actifs
            </button>
            <button class="tab-btn" onclick="switchTab('deleted')" id="corbeilleTab" style="display: none;">
                <i class="fas fa-trash-alt"></i> Corbeille
            </button>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <i class="fas fa-users icon-visitors"></i>
                <h3>TOTAL VISITEURS AUJOURD'HUI</h3>
                <div class="number" id="totalVisiteurs">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-user-check icon-present"></i>
                <h3>PRÉSENTS</h3>
                <div class="number" id="visiteursPresent">0</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-door-open icon-exit"></i>
                <h3>SORTIS</h3>
                <div class="number" id="visiteursSortis">0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header-row">
                <h3><i class="fas fa-list"></i> <span id="tableTitle">Liste des visiteurs actifs</span></h3>
                <div>
                    <input type="text" class="search-input" id="searchVisiteur"
                        placeholder="Rechercher..." onkeyup="filterVisiteurs()">
                    <button class="btn-refresh" onclick="refreshCurrentTab()">
                        <i class="fas fa-sync-alt"></i> Actualiser
                    </button>
                </div>
            </div>
            <table>
                <thead id="tableHeader">
                    <tr>
                        <th>NOM</th>
                        <th>PRÉNOM</th>
                        <th>STRUCTURE</th>
                        <th>DIRECTION</th>
                        <th>PERSONNE VISITÉE</th>
                        <th>ENTRÉE</th>
                        <th>SORTIE</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="visiteursTableBody"></tbody>
            </table>
        </div>

        <div class="footer-buttons">
            <button class="btn-back" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i> Retour au Dashboard
            </button>
        </div>
    </div>

    <!-- MODAL NOUVEAU VISITEUR -->
    <div id="modalVisiteur" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-user-plus"></i> Nouvelle visite</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Nom *</label>
                    <input type="text" id="visiteurNom" placeholder="Nom">
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="visiteurPrenom" placeholder="Prénom">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="visiteurTelephone" placeholder="06 XX XX XX XX">
                </div>
                <div class="form-group">
                    <label>Structure</label>
                    <input type="text" id="visiteurService" placeholder="Ex: DSI, RH, Direction...">
                    <small style="color: var(--text-muted); font-size: 11px;">Optionnel</small>
                </div>
            </div>
            <div class="form-group">
                <label>Personne visitée *</label>
                <select id="employeSelect">
                    <option value="">Chargement...</option>
                </select>
            </div>
            <button class="btn-submit" onclick="enregistrerEntree()">
                <i class="fas fa-sign-in-alt"></i> Enregistrer l'entrée
            </button>
            <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        </div>
    </div>

    <!-- MODAL MODIFIER VISITEUR -->
    <div id="modalEdit" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-user-edit"></i> Modifier la visite</h3>
            <input type="hidden" id="editVisiteurId">
            <div class="form-row">
                <div class="form-group">
                    <label>Nom *</label>
                    <input type="text" id="editNom" placeholder="Nom">
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="editPrenom" placeholder="Prénom">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="editTelephone" placeholder="06 XX XX XX XX">
                </div>
                <div class="form-group">
                    <label>Structure</label>
                    <input type="text" id="editService" placeholder="Ex: DSI, RH, Direction...">
                </div>
            </div>
            <div class="form-group">
                <label>Personne visitée *</label>
                <select id="editEmployeSelect">
                    <option value="">Chargement...</option>
                </select>
            </div>
            <button class="btn-submit" onclick="sauvegarderModification()">
                <i class="fas fa-save"></i> Enregistrer les modifications
            </button>
            <button class="btn-cancel" onclick="closeEditModal()">Annuler</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let allVisiteurs = [];
        let deletedVisiteurs = [];
        let employesList = [];
        let currentUser  = null;
        let currentTab = 'active';

        function showToast(message, type = 'success', duration = 3500) {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas ${icons[type] || 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.transition = 'opacity 0.3s, transform 0.3s';
                t.style.opacity    = '0';
                t.style.transform  = 'translateX(60px)';
                setTimeout(() => t.remove(), 320);
            }, duration);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tab === 'active') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('tableTitle').textContent = 'Liste des visiteurs actifs';
                document.getElementById('statsGrid').style.display = 'grid';
                loadVisiteurs();
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('tableTitle').textContent = 'Corbeille - Visiteurs supprimés';
                document.getElementById('statsGrid').style.display = 'none';
                loadDeletedVisiteurs();
            }
        }

        function refreshCurrentTab() {
            if (currentTab === 'active') { loadVisiteurs(); }
            else { loadDeletedVisiteurs(); }
        }

        async function loadDeletedVisiteurs() {
            try {
                const res = await apiRequest('http://localhost:3000/api/visiteurs/deleted');
                deletedVisiteurs = await res.json();
                renderDeletedVisiteursTable(deletedVisiteurs);
            } catch (err) {
                console.error(err);
                showToast('Erreur de chargement des visiteurs supprimés', 'error');
            }
        }

        function renderDeletedVisiteursTable(list) {
            const tbody = document.getElementById('visiteursTableBody');
            tbody.innerHTML = '';
            if (list.length === 0) {
                const row  = tbody.insertRow();
                const cell = row.insertCell(0);
                cell.colSpan = 8;
                cell.textContent = "Aucun visiteur dans la corbeille";
                cell.style.cssText = 'text-align:center;padding:40px;opacity:0.5';
                return;
            }
            list.forEach(v => {
                const row = tbody.insertRow();
                const direction = v.direction || '-';
                const personneVisitee = v.employe_nom ? `${v.employe_prenom || ''} ${v.employe_nom || ''}`.trim() : '-';
                const serviceOrigine = v.service_dorigine || '-';
                row.insertCell(0).textContent = v.nom || '-';
                row.insertCell(1).textContent = v.prenom || '-';
                row.insertCell(2).textContent = serviceOrigine;
                row.insertCell(3).textContent = direction;
                row.insertCell(4).textContent = personneVisitee;
                row.insertCell(5).textContent = v.heure_entree ? v.heure_entree.substring(0,5) : '-';
                row.insertCell(6).innerHTML = v.heure_sortie ? v.heure_sortie.substring(0,5) : '<span class="badge-present">En cours</span>';
                const actionsCell = row.insertCell(7);
                const wrap = document.createElement('div');
                wrap.className = 'actions-cell';
                const btnRestore = document.createElement('button');
                btnRestore.className = 'btn-restore';
                btnRestore.innerHTML = '<i class="fas fa-trash-restore"></i> Restaurer';
                btnRestore.onclick = () => restaurerVisiteur(v.id, v.nom, v.prenom);
                wrap.appendChild(btnRestore);
                actionsCell.appendChild(wrap);
            });
        }

        async function restaurerVisiteur(id, nom, prenom) {
            if (!confirm(`Restaurer la visite de ${prenom || ''} ${nom} ?`)) return;
            try {
                const res = await apiRequest(`http://localhost:3000/api/visiteurs/restore/${id}`, { method: 'PUT' });
                if (res.ok) {
                    showToast('♻️ Visiteur restauré avec succès');
                    loadDeletedVisiteurs();
                    loadVisiteurs();
                } else {
                    const err = await res.json();
                    showToast('Erreur : ' + (err.message || 'Impossible de restaurer'), 'error');
                }
            } catch { showToast('Erreur de connexion', 'error'); }
        }

        async function loadEmployes() {
            try {
                const res = await apiRequest('http://localhost:3000/api/employes');
                employesList = await res.json();
                populateEmployeSelect('employeSelect');
                populateEmployeSelect('editEmployeSelect');
            } catch (err) { console.error(err); }
        }

        function populateEmployeSelect(selectId, selectedId = '') {
            const select = document.getElementById(selectId);
            if (!select) return;
            select.innerHTML = '<option value="">Sélectionner une personne</option>';
            employesList.forEach(e => {
                const dir = e.direction ? ` (${e.direction})` : '';
                const opt = document.createElement('option');
                opt.value = e.id;
                opt.textContent = `${e.prenom || ''} ${e.nom || ''}${dir}`.trim();
                if (String(e.id) === String(selectedId)) opt.selected = true;
                select.appendChild(opt);
            });
        }

        async function enregistrerEntree() {
            const nom = document.getElementById('visiteurNom').value.trim();
            const prenom = document.getElementById('visiteurPrenom').value.trim();
            const telephone = document.getElementById('visiteurTelephone').value.trim();
            const service = document.getElementById('visiteurService').value.trim();
            const employeId = document.getElementById('employeSelect').value;
            if (!nom) { showToast('Veuillez saisir le nom', 'error'); return; }
            if (!employeId) { showToast('Sélectionnez une personne visitée', 'error'); return; }
            try {
                const res = await apiRequest('http://localhost:3000/api/visiteurs/entree', {
                    method: 'POST',
                    body: JSON.stringify({ nom, prenom: prenom || null, telephone: telephone || null, service_dorigine: service || null, employe_id: parseInt(employeId), stagiaire_id: null })
                });
                if (res.ok) {
                    showToast('✅ Entrée enregistrée avec succès');
                    closeModal(); resetForm(); loadVisiteurs();
                } else {
                    const error = await res.json();
                    showToast('Erreur : ' + (error.message || 'Erreur inconnue'), 'error');
                }
            } catch { showToast('Erreur de connexion', 'error'); }
        }

        async function enregistrerSortie(id) {
            if (!confirm('Enregistrer la sortie ?')) return;
            try {
                const res = await apiRequest(`http://localhost:3000/api/visiteurs/sortie/${id}`, { method: 'PUT' });
                if (res.ok) { showToast('✅ Sortie enregistrée'); loadVisiteurs(); }
                else showToast('Erreur lors de la sortie', 'error');
            } catch { showToast('Erreur de connexion', 'error'); }
        }

        function ouvrirModification(v) {
            document.getElementById('editVisiteurId').value = v.id;
            document.getElementById('editNom').value = v.nom || '';
            document.getElementById('editPrenom').value = v.prenom || '';
            document.getElementById('editTelephone').value = v.telephone || '';
            document.getElementById('editService').value = v.service_dorigine || '';
            populateEmployeSelect('editEmployeSelect', v.employe_id);
            document.getElementById('modalEdit').style.display = 'flex';
        }

        async function sauvegarderModification() {
            const id = document.getElementById('editVisiteurId').value;
            const nom = document.getElementById('editNom').value.trim();
            const prenom = document.getElementById('editPrenom').value.trim();
            const telephone = document.getElementById('editTelephone').value.trim();
            const service = document.getElementById('editService').value.trim();
            const employeId = document.getElementById('editEmployeSelect').value;
            if (!nom) { showToast('Veuillez saisir le nom', 'error'); return; }
            if (!employeId) { showToast('Sélectionnez une personne visitée', 'error'); return; }
            try {
                const res = await apiRequest(`http://localhost:3000/api/visiteurs/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ nom, prenom: prenom || null, telephone: telephone || null, service_dorigine: service || null, employe_id: parseInt(employeId) })
                });
                if (res.ok) {
                    showToast('✅ Visite modifiée avec succès');
                    closeEditModal(); loadVisiteurs();
                } else {
                    const err = await res.json();
                    showToast('Erreur : ' + (err.message || 'Erreur'), 'error');
                }
            } catch { showToast('Erreur de connexion', 'error'); }
        }

        function closeEditModal() { document.getElementById('modalEdit').style.display = 'none'; }

        async function supprimerVisite(id, nom, prenom, rowEl) {
            if (!confirm(`Supprimer la visite de ${prenom || ''} ${nom} ?\nLe visiteur sera déplacé dans la corbeille.`)) return;
            rowEl.querySelectorAll('button').forEach(b => b.disabled = true);
            rowEl.classList.add('row-deleting');
            try {
                const res = await apiRequest(`http://localhost:3000/api/visiteurs/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    setTimeout(() => {
                        rowEl.remove();
                        allVisiteurs = allVisiteurs.filter(v => String(v.id) !== String(id));
                        document.getElementById('totalVisiteurs').textContent = allVisiteurs.length;
                        document.getElementById('visiteursPresent').textContent = allVisiteurs.filter(v => !v.heure_sortie).length;
                        document.getElementById('visiteursSortis').textContent = allVisiteurs.filter(v => v.heure_sortie).length;
                        const tbody = document.getElementById('visiteursTableBody');
                        if (tbody.rows.length === 0) {
                            const row = tbody.insertRow();
                            const cell = row.insertCell(0);
                            cell.colSpan = 8;
                            cell.textContent = "Aucun visiteur aujourd'hui";
                            cell.style.cssText = 'text-align:center;padding:40px;opacity:0.5';
                        }
                        showToast('🗑️ Visiteur déplacé dans la corbeille');
                    }, 400);
                } else {
                    rowEl.classList.remove('row-deleting');
                    rowEl.querySelectorAll('button').forEach(b => b.disabled = false);
                    const err = await res.json();
                    showToast('Erreur : ' + (err.message || 'Impossible de supprimer'), 'error');
                }
            } catch {
                rowEl.classList.remove('row-deleting');
                rowEl.querySelectorAll('button').forEach(b => b.disabled = false);
                showToast('Erreur de connexion', 'error');
            }
        }

        async function loadVisiteurs() {
            try {
                const res = await apiRequest('http://localhost:3000/api/visiteurs/today');
                allVisiteurs = await res.json();
                document.getElementById('totalVisiteurs').textContent = allVisiteurs.length;
                document.getElementById('visiteursPresent').textContent = allVisiteurs.filter(v => !v.heure_sortie).length;
                document.getElementById('visiteursSortis').textContent = allVisiteurs.filter(v => v.heure_sortie).length;
                renderVisiteursTable(allVisiteurs);
            } catch (err) { console.error(err); showToast('Erreur de chargement', 'error'); }
        }

        function renderVisiteursTable(list) {
            const tbody = document.getElementById('visiteursTableBody');
            tbody.innerHTML = '';
            if (list.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell(0);
                cell.colSpan = 8;
                cell.textContent = "Aucun visiteur aujourd'hui";
                cell.style.cssText = 'text-align:center;padding:40px;opacity:0.5';
                return;
            }
            list.forEach(v => {
                const row = tbody.insertRow();
                const direction = v.direction || '-';
                const personneVisitee = v.employe_nom ? `${v.employe_prenom || ''} ${v.employe_nom || ''}`.trim() : '-';
                const serviceOrigine = v.service_dorigine || '-';
                row.insertCell(0).textContent = v.nom || '-';
                row.insertCell(1).textContent = v.prenom || '-';
                row.insertCell(2).textContent = serviceOrigine;
                row.insertCell(3).textContent = direction;
                row.insertCell(4).textContent = personneVisitee;
                row.insertCell(5).textContent = v.heure_entree ? v.heure_entree.substring(0,5) : '-';
                row.insertCell(6).innerHTML = v.heure_sortie ? v.heure_sortie.substring(0,5) : '<span class="badge-present">En cours</span>';
                const actionsCell = row.insertCell(7);
                const wrap = document.createElement('div');
                wrap.className = 'actions-cell';
                if (!v.heure_sortie) {
                    const btnSortie = document.createElement('button');
                    btnSortie.className = 'btn-sortie-action';
                    btnSortie.innerHTML = '<i class="fas fa-door-open"></i> Sortie';
                    btnSortie.onclick = () => enregistrerSortie(v.id);
                    wrap.appendChild(btnSortie);
                } else {
                    const badge = document.createElement('span');
                    badge.className = 'badge-sorti';
                    badge.textContent = 'Sorti';
                    wrap.appendChild(badge);
                }
                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn-edit';
                btnEdit.innerHTML = '<i class="fas fa-pen"></i> Modifier';
                btnEdit.onclick = () => ouvrirModification(v);
                wrap.appendChild(btnEdit);
                const btnDel = document.createElement('button');
                btnDel.className = 'btn-delete';
                btnDel.innerHTML = '<i class="fas fa-trash"></i> Supprimer';
                btnDel.onclick = () => supprimerVisite(v.id, v.nom, v.prenom, row);
                wrap.appendChild(btnDel);
                actionsCell.appendChild(wrap);
            });
        }

        function filterVisiteurs() {
            const search = document.getElementById('searchVisiteur').value.toLowerCase();
            if (currentTab === 'active') {
                if (!search) { renderVisiteursTable(allVisiteurs); return; }
                const filtered = allVisiteurs.filter(v =>
                    (v.nom || '').toLowerCase().includes(search) ||
                    (v.prenom || '').toLowerCase().includes(search) ||
                    (v.service_dorigine || '').toLowerCase().includes(search) ||
                    (v.direction || '').toLowerCase().includes(search) ||
                    (v.employe_nom || '').toLowerCase().includes(search) ||
                    (v.employe_prenom || '').toLowerCase().includes(search)
                );
                renderVisiteursTable(filtered);
            } else {
                if (!search) { renderDeletedVisiteursTable(deletedVisiteurs); return; }
                const filtered = deletedVisiteurs.filter(v =>
                    (v.nom || '').toLowerCase().includes(search) ||
                    (v.prenom || '').toLowerCase().includes(search) ||
                    (v.service_dorigine || '').toLowerCase().includes(search) ||
                    (v.direction || '').toLowerCase().includes(search) ||
                    (v.employe_nom || '').toLowerCase().includes(search) ||
                    (v.employe_prenom || '').toLowerCase().includes(search)
                );
                renderDeletedVisiteursTable(filtered);
            }
        }

        function openModal()  { document.getElementById('modalVisiteur').style.display = 'flex'; resetForm(); }
        function closeModal() { document.getElementById('modalVisiteur').style.display = 'none'; }
        function resetForm()  {
            ['visiteurNom','visiteurPrenom','visiteurTelephone','visiteurService'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = '';
            });
            const sel = document.getElementById('employeSelect'); if (sel) sel.value = '';
        }
        window.onclick = function(e) {
            if (e.target === document.getElementById('modalVisiteur')) closeModal();
            if (e.target === document.getElementById('modalEdit')) closeEditModal();
        };

        async function loadUserInfo() {
            let user = getUser();
            try {
                const res = await apiRequest('http://localhost:3000/api/auth/me');
                if (res.ok) user = await res.json();
            } catch (_) {}
            if (user) {
                currentUser = user;
                document.getElementById('userName').textContent = `${user.prenom || ''} ${user.nom || ''}`.trim() || user.email || '';
                const badge = document.getElementById('roleBadge');
                badge.textContent = user.role === 'admin' ? '👑 Administrateur' : '🛡️ Agent de sécurité';
                badge.style.background = user.role === 'admin'
                    ? 'linear-gradient(135deg,#6c63ff,#a855f7)'
                    : 'linear-gradient(135deg,#06b6d4,#0891b2)';
                badge.style.color = '#fff';

                if (user.role === 'admin') {
                    // Admin : afficher l'onglet Corbeille
                    document.getElementById('corbeilleTab').style.display = 'flex';
                } else {
                    // Agent : cacher tout le bloc tabs (inutile) ✅
                    document.getElementById('tabsContainer').style.display = 'none';
                }
            }
        }

        checkAuth();
        loadUserInfo();
        loadEmployes();
        loadVisiteurs();
    </script>
</body>
</html>
