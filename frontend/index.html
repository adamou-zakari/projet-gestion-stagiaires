<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANSI Niger — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #020f1f 0%, #071e3d 40%, #0a2d5a 70%, #0d3a72 100%);
      font-family: 'Outfit', sans-serif;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22,113,217,0.12) 0%, transparent 70%);
      top: -200px;
      left: -150px;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,158,255,0.08) 0%, transparent 70%);
      bottom: -100px;
      right: -80px;
    }
    .bg-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .login-card {
      position: relative;
      z-index: 10;
      background: #fff;
      border-radius: 28px;
      width: 100%;
      max-width: 440px;
      padding: 40px 38px 32px;
      box-shadow: 0 32px 80px rgba(2,10,30,0.55);
      margin: 20px;
    }
    .logo-wrap {
      width: 96px;
      height: 96px;
      background: #f0f4fa;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
    }
    .logo-wrap img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .card-head {
      text-align: center;
      margin-bottom: 24px;
    }
    .card-head h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #0a2540;
      margin-bottom: 6px;
    }
    .card-head p {
      font-size: 13px;
      color: #94a3b8;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .input-box {
      display: flex;
      align-items: center;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background: #f8fafc;
      transition: all 0.2s;
    }
    .input-box:focus-within {
      border-color: #1671d9;
      box-shadow: 0 0 0 3px rgba(22,113,217,0.12);
      background: #fff;
    }
    .input-ico {
      width: 46px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1671d9;
      border-right: 1px solid #e2e8f0;
    }
    .input-box input {
      flex: 1;
      height: 50px;
      border: none;
      outline: none;
      padding: 0 14px;
      font-size: 14px;
      background: transparent;
      font-family: 'Outfit', sans-serif;
    }
    .eye-btn {
      width: 46px;
      height: 50px;
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
    }
    .btn-login {
      width: 100%;
      height: 52px;
      background: #1671d9;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-top: 18px;
      transition: all 0.2s;
    }
    .btn-login:hover {
      background: #0e5a9e;
      transform: translateY(-2px);
    }
    .error-box {
      display: none;
      background: rgba(220,38,38,0.07);
      border: 1px solid rgba(220,38,38,0.2);
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="bg-dots"></div>
  <div class="login-card">
    <div class="logo-wrap">
      <img src="logo.png" alt="ANSI" onerror="this.style.display='none'">
    </div>
    <div class="card-head">
      <h1>Connexion</h1>
      <p>Accès réservé au personnel autorisé</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <div class="input-box">
          <div class="input-ico"><i class="fas fa-user"></i></div>
          <input type="text" id="identifiant" placeholder="Identifiant ou email" required>
        </div>
      </div>
      <div class="form-group">
        <div class="input-box">
          <div class="input-ico"><i class="fas fa-lock"></i></div>
          <input type="password" id="password" placeholder="Mot de passe" required>
          <button type="button" class="eye-btn" onclick="togglePass()"><i class="fas fa-eye-slash"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
      <div class="error-box" id="errorBox"></div>
    </form>
  </div>
  <script>
    // ── Vérifier si setup est nécessaire avant de montrer le login ──
    (async function checkSetupFirst() {
      try {
        const res  = await fetch('http://localhost:3000/api/auth/setup/check');
        const data = await res.json();
        if (!data.configured) {
          // Aucun admin → rediriger vers setup
          window.location.href = 'setup.html';
          return;
        }
      } catch(e) {
        // Si serveur inaccessible, on reste sur la page login
      }
    })();

    function togglePass() {
      const input = document.getElementById('password');
      const icon = event.currentTarget.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye-slash';
      }
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const identifiant = document.getElementById('identifiant').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.querySelector('.btn-login');
      const errorBox = document.getElementById('errorBox');
      errorBox.style.display = 'none';
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
      btn.disabled = true;
      try {
        const res = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifiant, mot_de_passe: password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          errorBox.style.display = 'flex';
          errorBox.innerHTML = '<i class="fas fa-times-circle"></i> ' + (data.message || 'Identifiant ou mot de passe incorrect');
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
          btn.disabled = false;
        }
      } catch (err) {
        errorBox.style.display = 'flex';
        errorBox.innerHTML = '<i class="fas fa-times-circle"></i> Impossible de contacter le serveur';
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
