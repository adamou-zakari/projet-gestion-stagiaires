<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Stagiaires</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
        .page-header h2 { font-size:1.5rem; font-weight:600; color:white; }
        .btn-primary { background:linear-gradient(135deg,#06b6d4,#0891b2); color:white; border:none; padding:12px 24px; border-radius:12px; cursor:pointer; font-weight:600; display:inline-flex; align-items:center; gap:10px; transition:all 0.2s; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(6,182,212,0.3); }
        .footer-buttons { display:flex; justify-content:center; margin-top:30px; margin-bottom:20px; }
        .btn-back { background:rgba(148,163,184,0.2); color:#cbd5e1; border:1px solid rgba(148,163,184,0.3); padding:12px 28px; border-radius:12px; cursor:pointer; font-weight:600; display:inline-flex; align-items:center; gap:10px; transition:all 0.2s; font-size:14px; }
        .btn-back:hover { background:rgba(148,163,184,0.3); transform:translateY(-2px); color:white; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:linear-gradient(135deg,#1e293b,#0f172a); border-radius:28px; padding:32px; width:90%; max-width:540px; border:1px solid rgba(255,255,255,0.1); box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); max-height:90vh; overflow-y:auto; }
        .modal-content h3 { font-size:1.5rem; font-weight:600; margin-bottom:24px; color:white; display:flex; align-items:center; gap:10px; justify-content:center; }
        .modal-content h3 i { color:#06b6d4; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; margin-bottom:8px; font-weight:500; color:rgba(255,255,255,0.7); font-size:13px; }
        .form-group label i { margin-right:6px; color:#06b6d4; }
        .form-group input, .form-group select { width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:white; font-size:14px; font-family:'Outfit',sans-serif; box-sizing:border-box; }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:#06b6d4; background:rgba(255,255,255,0.08); }
        .form-group select option { background:#1e293b; }
        .btn-submit { background:linear-gradient(135deg,#06b6d4,#0891b2); color:white; border:none; padding:14px; border-radius:14px; cursor:pointer; font-weight:600; width:100%; font-size:15px; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-cancel { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.15); padding:12px; border-radius:12px; cursor:pointer; width:100%; margin-top:12px; }
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:30px; }
        .stat-card { background:rgba(255,255,255,0.04); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:24px; text-align:center; }
        .stat-card i { font-size:36px; margin-bottom:12px; display:inline-block; }
        .stat-card h3 { font-size:14px; font-weight:500; color:rgba(255,255,255,0.6); margin-bottom:8px; }
        .stat-card .number { font-size:32px; font-weight:700; color:white; }
        .search-input { padding:10px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:white; width:250px; margin-right:10px; }
        .btn-refresh { background:rgba(6,182,212,0.2); border:1px solid rgba(6,182,212,0.3); color:#06b6d4; padding:10px 16px; border-radius:12px; cursor:pointer; }
        .btn-edit { background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); color:#60a5fa; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
        .btn-delete { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#f87171; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
        .toast { position:fixed; bottom:28px; right:28px; color:#fff; padding:14px 22px; border-radius:14px; font-weight:600; font-size:14px; z-index:9999; animation:toastIn 0.3s ease; box-shadow:0 6px 20px rgba(0,0,0,0.45); display:flex; align-items:center; gap:10px; }
        .toast.success { background:linear-gradient(135deg,#10b981,#059669); }
        .toast.error   { background:linear-gradient(135deg,#ef4444,#dc2626); }
        @keyframes toastIn { from { transform:translateX(110%); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @media (max-width:768px) { .stats-grid { grid-template-columns:repeat(2,1fr); } .form-row { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="dashboard-container">

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-bar-left">
            <img src="logo.png" alt="Logo ANSI" class="ansi-logo" onerror="this.style.display='none'">
            <h1>Gestion des Stagiaires</h1>
        </div>
        <div class="user-info">
            <span class="role-badge" id="roleBadge"></span>
            <i class="fas fa-user-circle"></i>
            <span id="userName"></span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>
    </div>

    <!-- EN-TÊTE -->
    <div class="page-header">
        <h2><i class="fas fa-user-graduate"></i> Liste des stagiaires</h2>
        <button class="btn-primary" onclick="openAddModal()">
            <i class="fas fa-plus-circle"></i> Nouveau stagiaire
        </button>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-user-graduate" style="color:#3b82f6;"></i><h3>TOTAL STAGIAIRES</h3><div class="number" id="totalStagiaires">0</div></div>
        <div class="stat-card"><i class="fas fa-check-circle" style="color:#10b981;"></i><h3>PRÉSENTS</h3><div class="number" id="stagiairesActifs">0</div></div>
        <div class="stat-card"><i class="fas fa-clock" style="color:#f59e0b;"></i><h3>EN STAGE</h3><div class="number" id="stagiairesEnStage">0</div></div>
        <div class="stat-card"><i class="fas fa-chart-line" style="color:#8b5cf6;"></i><h3>TERMINÉS</h3><div class="number" id="stagiairesTermines">0</div></div>
    </div>

    <!-- TABLEAU -->
    <div class="table-container">
        <div class="table-header-row">
            <h3><i class="fas fa-list"></i> Liste des stagiaires</h3>
            <div>
                <input type="text" class="search-input" id="searchStagiaire" placeholder="Rechercher..." onkeyup="filterStagiaires()">
                <button class="btn-refresh" onclick="loadStagiaires()"><i class="fas fa-sync-alt"></i> Actualiser</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>NOM & PRÉNOM</th>
                    <th>EMAIL</th>
                    <th>DIRECTION DE STAGE</th><!-- ✅ AJOUTÉ -->
                    <th>TÉLÉPHONE</th>
                    <th>DATE DÉBUT</th>
                    <th>DATE FIN</th>
                    <th>STATUT</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="stagiairesTableBody"></tbody>
        </table>
    </div>

    <div class="footer-buttons">
        <button class="btn-back" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i> Retour au Dashboard
        </button>
    </div>
</div>

<!-- ══════════════════════════════════════════════════ -->
<!-- MODAL AJOUTER                                      -->
<!-- ══════════════════════════════════════════════════ -->
<div id="modalAdd" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-user-graduate"></i> Ajouter un stagiaire</h3>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nom *</label>
                <input type="text" id="addNom" placeholder="Nom">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Prénom *</label>
                <input type="text" id="addPrenom" placeholder="Prénom">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="addEmail" placeholder="email@exemple.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Téléphone</label>
                <input type="tel" id="addTelephone" placeholder="06 XX XX XX XX">
            </div>
        </div>
        <!-- ✅ DIRECTION -->
        <div class="form-group">
            <label><i class="fas fa-building"></i> Direction de stage</label>
            <select id="addDirection">
                <option value="">-- Sélectionner une direction --</option>
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Date début</label>
                <input type="date" id="addDateDebut">
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar-check"></i> Date fin</label>
                <input type="date" id="addDateFin">
            </div>
        </div>
        <button class="btn-submit" onclick="ajouterStagiaire()">
            <i class="fas fa-save"></i> Enregistrer
        </button>
        <button class="btn-cancel" onclick="closeAddModal()">Annuler</button>
    </div>
</div>

<!-- ══════════════════════════════════════════════════ -->
<!-- MODAL MODIFIER                                     -->
<!-- ══════════════════════════════════════════════════ -->
<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-edit"></i> Modifier le stagiaire</h3>
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nom *</label>
                <input type="text" id="editNom" placeholder="Nom">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Prénom *</label>
                <input type="text" id="editPrenom" placeholder="Prénom">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="editEmail" placeholder="email@exemple.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Téléphone</label>
                <input type="tel" id="editTelephone" placeholder="06 XX XX XX XX">
            </div>
        </div>
        <!-- ✅ DIRECTION -->
        <div class="form-group">
            <label><i class="fas fa-building"></i> Direction de stage</label>
            <select id="editDirection">
                <option value="">-- Sélectionner une direction --</option>
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Date début</label>
                <input type="date" id="editDateDebut">
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar-check"></i> Date fin</label>
                <input type="date" id="editDateFin">
            </div>
        </div>
        <button class="btn-submit" onclick="sauvegarderModification()">
            <i class="fas fa-save"></i> Enregistrer les modifications
        </button>
        <button class="btn-cancel" onclick="closeEditModal()">Annuler</button>
    </div>
</div>

<script src="script.js"></script>
<script>
    let stagiairesList = [];
    let directionsList = [];

    // ── Directions ───────────────────────────────────────
    async function loadDirections() {
        try {
            const res = await apiRequest('http://localhost:3000/api/directions');
            if (res.ok) {
                directionsList = await res.json();
                populateDirectionSelect('addDirection');
                populateDirectionSelect('editDirection');
            }
        } catch (e) { console.error('Erreur directions:', e); }
    }

    function populateDirectionSelect(selectId, selectedId = '') {
        const select = document.getElementById(selectId);
        if (!select) return;
        select.innerHTML = '<option value="">-- Sélectionner une direction --</option>';
        directionsList.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.id;
            opt.textContent = d.nom;
            if (String(d.id) === String(selectedId)) opt.selected = true;
            select.appendChild(opt);
        });
    }

    // ── Utilitaires ──────────────────────────────────────
    function estActif(stagiaire) {
        if (!stagiaire.date_fin) return true;
        const today = new Date(); today.setHours(0,0,0,0);
        const dateFin = new Date(stagiaire.date_fin); dateFin.setHours(0,0,0,0);
        return dateFin >= today;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        return d.toLocaleDateString('fr-FR');
    }

    function showToast(message, type = 'success') {
        document.querySelectorAll('.toast').forEach(t => t.remove());
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'times-circle'}"></i> ${message}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    // ── Chargement ────────────────────────────────────────
    async function loadStagiaires() {
        try {
            const res = await apiRequest('http://localhost:3000/api/stagiaires');
            stagiairesList = await res.json();
            stagiairesList = stagiairesList.map(s => ({ ...s, est_actif: estActif(s) }));

            const total    = stagiairesList.length;
            const presents = stagiairesList.filter(s => (s.est_present === true || s.est_present === 1) && s.est_actif).length;
            const actifs   = stagiairesList.filter(s => s.est_actif).length;
            const termines = stagiairesList.filter(s => !s.est_actif).length;

            document.getElementById('totalStagiaires').textContent = total;
            document.getElementById('stagiairesActifs').textContent = presents;
            document.getElementById('stagiairesEnStage').textContent = actifs;
            document.getElementById('stagiairesTermines').textContent = termines;

            renderStagiairesTable(stagiairesList);
        } catch (err) { console.error(err); }
    }

    function renderStagiairesTable(stagiaires) {
        const tbody = document.getElementById('stagiairesTableBody');
        tbody.innerHTML = '';
        if (stagiaires.length === 0) {
            const row = tbody.insertRow();
            const cell = row.insertCell(0);
            cell.colSpan = 9;
            cell.textContent = 'Aucun stagiaire';
            cell.style.cssText = 'text-align:center;padding:40px;opacity:0.5';
            return;
        }
        stagiaires.forEach(s => {
            const row = tbody.insertRow();
            const estActifFlag   = estActif(s);
            const estPresentFlag = (s.est_present === true || s.est_present === 1);

            row.insertCell(0).textContent = s.id;
            row.insertCell(1).innerHTML   = `<strong>${`${s.prenom||''} ${s.nom||''}`.trim()}</strong>`;
            row.insertCell(2).textContent = s.email || '-';
            // ✅ Direction
            row.insertCell(3).textContent = s.direction || '-';
            row.insertCell(4).textContent = s.telephone || '-';
            row.insertCell(5).textContent = formatDate(s.date_debut);
            row.insertCell(6).textContent = formatDate(s.date_fin);

            let statutHtml = '';
            if (!estActifFlag) {
                statutHtml = '<span class="badge-termine">Terminé</span>';
            } else if (estPresentFlag) {
                statutHtml = '<span class="badge-present">● Présent</span>';
            } else {
                statutHtml = '<span style="color:rgba(255,255,255,0.4);font-size:13px;">Absent</span>';
            }
            row.insertCell(7).innerHTML = statutHtml;
            row.insertCell(8).innerHTML = `
                <button class="btn-edit" onclick="openEditModal(${s.id})"><i class="fas fa-edit"></i> Modifier</button>
                <button class="btn-delete" onclick="deleteStagiaire(${s.id})"><i class="fas fa-trash"></i></button>
            `;
        });
    }

    function filterStagiaires() {
        const search = document.getElementById('searchStagiaire').value.toLowerCase();
        const filtered = stagiairesList.filter(s =>
            (s.nom || '').toLowerCase().includes(search) ||
            (s.prenom || '').toLowerCase().includes(search) ||
            (s.email || '').toLowerCase().includes(search) ||
            (s.direction || '').toLowerCase().includes(search)
        );
        renderStagiairesTable(filtered);
    }

    // ── Modal Ajouter ─────────────────────────────────────
    function openAddModal() {
        document.getElementById('addNom').value       = '';
        document.getElementById('addPrenom').value    = '';
        document.getElementById('addEmail').value     = '';
        document.getElementById('addTelephone').value = '';
        document.getElementById('addDateDebut').value = '';
        document.getElementById('addDateFin').value   = '';
        populateDirectionSelect('addDirection');
        document.getElementById('modalAdd').style.display = 'flex';
    }
    function closeAddModal() { document.getElementById('modalAdd').style.display = 'none'; }

    async function ajouterStagiaire() {
        const nom          = document.getElementById('addNom').value.trim();
        const prenom       = document.getElementById('addPrenom').value.trim();
        const email        = document.getElementById('addEmail').value.trim();
        const telephone    = document.getElementById('addTelephone').value.trim();
        const direction_id = document.getElementById('addDirection').value || null;
        const date_debut   = document.getElementById('addDateDebut').value;
        const date_fin     = document.getElementById('addDateFin').value;

        if (!nom || !prenom) { showToast('Veuillez saisir le nom et le prénom', 'error'); return; }
        try {
            const res = await apiRequest('http://localhost:3000/api/stagiaires', {
                method: 'POST',
                body: JSON.stringify({ nom, prenom, email, telephone, direction_id, date_debut, date_fin })
            });
            if (res.ok) {
                showToast('✅ Stagiaire ajouté avec succès');
                closeAddModal();
                loadStagiaires();
            } else {
                const error = await res.json();
                showToast('Erreur: ' + (error.message || 'Erreur'), 'error');
            }
        } catch (err) { showToast('Erreur de connexion', 'error'); }
    }

    // ── Modal Modifier ────────────────────────────────────
    function openEditModal(id) {
        const s = stagiairesList.find(s => s.id === id);
        if (!s) return;

        document.getElementById('editId').value        = s.id;
        document.getElementById('editNom').value       = s.nom    || '';
        document.getElementById('editPrenom').value    = s.prenom || '';
        document.getElementById('editEmail').value     = s.email  || '';
        document.getElementById('editTelephone').value = s.telephone || '';
        document.getElementById('editDateDebut').value = s.date_debut ? s.date_debut.split('T')[0] : '';
        document.getElementById('editDateFin').value   = s.date_fin   ? s.date_fin.split('T')[0]   : '';

        populateDirectionSelect('editDirection', s.direction_id || '');
        document.getElementById('modalEdit').style.display = 'flex';
    }
    function closeEditModal() { document.getElementById('modalEdit').style.display = 'none'; }

    async function sauvegarderModification() {
        const id           = document.getElementById('editId').value;
        const nom          = document.getElementById('editNom').value.trim();
        const prenom       = document.getElementById('editPrenom').value.trim();
        const email        = document.getElementById('editEmail').value.trim();
        const telephone    = document.getElementById('editTelephone').value.trim();
        const direction_id = document.getElementById('editDirection').value || null;
        const date_debut   = document.getElementById('editDateDebut').value;
        const date_fin     = document.getElementById('editDateFin').value;

        if (!nom || !prenom) { showToast('Nom et prénom obligatoires', 'error'); return; }
        try {
            const res = await apiRequest(`http://localhost:3000/api/stagiaires/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ nom, prenom, email, telephone, direction_id, date_debut, date_fin })
            });
            if (res.ok) {
                showToast('✅ Stagiaire modifié avec succès');
                closeEditModal();
                loadStagiaires();
            } else {
                const error = await res.json();
                showToast('Erreur: ' + (error.message || 'Erreur'), 'error');
            }
        } catch (err) { showToast('Erreur de connexion', 'error'); }
    }

    async function deleteStagiaire(id) {
        if (!confirm('Supprimer ce stagiaire ?')) return;
        try {
            const res = await apiRequest(`http://localhost:3000/api/stagiaires/${id}`, { method: 'DELETE' });
            if (res.ok) { showToast('🗑️ Stagiaire supprimé'); loadStagiaires(); }
            else { const e = await res.json(); showToast(e.message || 'Erreur', 'error'); }
        } catch (err) { showToast('Erreur de connexion', 'error'); }
    }

    async function loadUserInfo() {
        const user = getUser();
        if (user) {
            document.getElementById('userName').textContent = `${user.prenom||''} ${user.nom||''}`.trim() || user.email;
            const badge = document.getElementById('roleBadge');
            if (user.role === 'admin') {
                badge.textContent = '👑 Administrateur';
                badge.style.background = 'linear-gradient(135deg,#6c63ff,#a855f7)';
            } else {
                badge.textContent = '🛡️ Agent de sécurité';
                badge.style.background = 'linear-gradient(135deg,#06b6d4,#0891b2)';
            }
        }
    }

    window.onclick = function(e) {
        if (e.target === document.getElementById('modalAdd'))  closeAddModal();
        if (e.target === document.getElementById('modalEdit')) closeEditModal();
    };

    loadUserInfo();
    loadDirections();
    loadStagiaires();
</script>
</body>
</html>
