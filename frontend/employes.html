<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Employés</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
        }

        /* Bouton Retour centré en bas */
        .footer-buttons {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .btn-back {
            background: rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.3);
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-back:hover {
            background: rgba(148, 163, 184, 0.3);
            transform: translateY(-2px);
            color: white;
        }

        /* Layout 2 colonnes */
        .two-columns {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        /* Sidebar Directions */
        .directions-panel {
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 20px;
            height: fit-content;
        }

        .directions-panel h3 {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .directions-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .direction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 10px 14px;
            border-radius: 12px;
        }

        .direction-name {
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            font-weight: 500;
        }

        .direction-delete {
            background: rgba(239,68,68,0.2);
            border: none;
            color: #f87171;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
        }

        .add-direction {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .add-direction input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 10px 14px;
            color: white;
            font-size: 13px;
        }

        .add-direction input:focus {
            outline: none;
            border-color: #06b6d4;
        }

        .add-direction button {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            border: none;
            color: white;
            padding: 0 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Formulaire Employé */
        .form-panel {
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
        }

        .form-panel h3 {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #06b6d4;
        }

        .form-group select option {
            background: #1e293b;
            color: white;
        }

        .btn-submit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Tableau Employés */
        .table-container {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .table-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .table-header-row h3 {
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }

        .search-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            width: 250px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 14px 20px;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        td {
            padding: 12px 20px;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .btn-edit {
            background: rgba(59,130,246,0.2);
            border: 1px solid rgba(59,130,246,0.3);
            color: #3b82f6;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-delete {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="top-bar-left">
                <img src="logo.png" alt="Logo ANSI" class="ansi-logo" onerror="this.style.display='none'">
                <h1>Gestion des Employés</h1>
            </div>
            <div class="user-info">
                <span class="role-badge" id="roleBadge"></span>
                <i class="fas fa-user-circle"></i>
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </button>
            </div>
        </div>

        <!-- EN-TÊTE -->
        <div class="page-header">
            <h2><i class="fas fa-id-badge"></i> Gestion des employés</h2>
        </div>

        <!-- 2 COLONNES : Directions + Formulaire -->
        <div class="two-columns">
            <!-- Panel Directions -->
            <div class="directions-panel">
                <h3><i class="fas fa-building"></i> Directions</h3>
                <div class="directions-list" id="directionsList">
                    <div style="text-align:center; padding:20px; color:rgba(255,255,255,0.5);">Chargement...</div>
                </div>
                <div class="add-direction">
                    <input type="text" id="newDirectionName" placeholder="Nouvelle direction...">
                    <button onclick="addDirection()"><i class="fas fa-plus"></i></button>
                </div>
            </div>

            <!-- Formulaire Employé (TOUJOURS VISIBLE) -->
            <div class="form-panel">
                <h3><i class="fas fa-user-plus"></i> Ajouter un employé</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nom *</label>
                        <input type="text" id="empNom" placeholder="Nom">
                    </div>
                    <div class="form-group">
                        <label>Prénom *</label>
                        <input type="text" id="empPrenom" placeholder="Prénom">
                    </div>
                </div>
                <div class="form-group">
                    <label>Direction *</label>
                    <select id="empDirection">
                        <option value="">Sélectionner une direction</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="empEmail" placeholder="email@exemple.com">
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="empTelephone" placeholder="06 XX XX XX XX">
                </div>
                <button class="btn-submit" onclick="ajouterEmploye()">
                    <i class="fas fa-save"></i> Ajouter l'employé
                </button>
            </div>
        </div>

        <!-- Tableau des employés -->
        <div class="table-container">
            <div class="table-header-row">
                <h3><i class="fas fa-users"></i> Liste des employés</h3>
                <input type="text" class="search-input" id="searchEmploye" placeholder="Rechercher par nom, prénom..." onkeyup="filterEmployes()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOM & PRÉNOM</th>
                        <th>EMAIL</th>
                        <th>TÉLÉPHONE</th>
                        <th>DIRECTION</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="employesTableBody"></tbody>
            </table>
        </div>

        <!-- BOUTON RETOUR CENTRÉ EN BAS -->
        <div class="footer-buttons">
            <button class="btn-back" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i> Retour au Dashboard
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const currentUser = getUser();
        if (!currentUser || currentUser.role !== 'admin') {
            alert('⛔ Accès refusé. Cette page est réservée aux administrateurs.');
            window.location.href = 'dashboard.html';
        }

        let employesList = [];
        let directionsList = [];

        async function loadDirections() {
            try {
                const res = await apiRequest('http://localhost:3000/api/directions');
                directionsList = await res.json();
                const container = document.getElementById('directionsList');
                const select = document.getElementById('empDirection');
                
                if (directionsList.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:20px; color:rgba(255,255,255,0.5);">Aucune direction</div>';
                } else {
                    container.innerHTML = directionsList.map(d => `
                        <div class="direction-item">
                            <span class="direction-name">${escapeHtml(d.nom)}</span>
                            <button class="direction-delete" onclick="deleteDirection(${d.id})">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `).join('');
                }
                
                select.innerHTML = '<option value="">Sélectionner une direction</option>' + 
                    directionsList.map(d => `<option value="${d.id}">${escapeHtml(d.nom)}</option>`).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function addDirection() {
            const nom = document.getElementById('newDirectionName').value.trim();
            if (!nom) { alert('Veuillez saisir un nom'); return; }
            try {
                const res = await apiRequest('http://localhost:3000/api/directions', {
                    method: 'POST',
                    body: JSON.stringify({ nom })
                });
                if (res.ok) {
                    document.getElementById('newDirectionName').value = '';
                    loadDirections();
                } else alert('Erreur');
            } catch (err) { alert('Erreur'); }
        }

        async function deleteDirection(id) {
            if (!confirm('Supprimer cette direction ?')) return;
            try {
                const res = await apiRequest(`http://localhost:3000/api/directions/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadDirections();
                    loadEmployes();
                } else {
                    const error = await res.json();
                    alert(error.message || 'Erreur');
                }
            } catch (err) { alert('Cette direction contient des employés'); }
        }

        async function loadEmployes() {
            try {
                const res = await apiRequest('http://localhost:3000/api/employes');
                employesList = await res.json();
                renderEmployesTable(employesList);
            } catch (err) { console.error(err); }
        }

        function renderEmployesTable(employes) {
            const tbody = document.getElementById('employesTableBody');
            tbody.innerHTML = '';
            
            if (employes.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell(0);
                cell.colSpan = 6;
                cell.textContent = 'Aucun employé';
                cell.style.textAlign = 'center';
                cell.style.padding = '40px';
                return;
            }
            
            employes.forEach(emp => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = emp.id;
                row.insertCell(1).textContent = `${emp.prenom || ''} ${emp.nom || ''}`.trim();
                row.insertCell(2).textContent = emp.email || '-';
                row.insertCell(3).textContent = emp.telephone || '-';
                row.insertCell(4).textContent = emp.direction || '-';
                
                row.insertCell(5).innerHTML = `
                    <button class="btn-edit" onclick="editEmploye(${emp.id})"><i class="fas fa-edit"></i></button>
                    <button class="btn-delete" onclick="deleteEmploye(${emp.id})"><i class="fas fa-trash"></i></button>
                `;
            });
        }

        function filterEmployes() {
            const search = document.getElementById('searchEmploye').value.toLowerCase();
            const filtered = employesList.filter(emp => 
                (emp.nom || '').toLowerCase().includes(search) || 
                (emp.prenom || '').toLowerCase().includes(search)
            );
            renderEmployesTable(filtered);
        }

        async function ajouterEmploye() {
            const nom = document.getElementById('empNom').value.trim();
            const prenom = document.getElementById('empPrenom').value.trim();
            const direction_id = document.getElementById('empDirection').value;
            const email = document.getElementById('empEmail').value.trim();
            const telephone = document.getElementById('empTelephone').value.trim();
            
            if (!nom) { alert('Veuillez saisir le nom'); return; }
            if (!direction_id) { alert('Veuillez sélectionner une direction'); return; }
            
            try {
                const res = await apiRequest('http://localhost:3000/api/employes', {
                    method: 'POST',
                    body: JSON.stringify({ nom, prenom, direction_id, email, telephone })
                });
                if (res.ok) {
                    document.getElementById('empNom').value = '';
                    document.getElementById('empPrenom').value = '';
                    document.getElementById('empEmail').value = '';
                    document.getElementById('empTelephone').value = '';
                    document.getElementById('empDirection').value = '';
                    loadEmployes();
                    alert('Employé ajouté avec succès');
                } else alert('Erreur lors de l\'ajout');
            } catch (err) { alert('Erreur'); }
        }

        async function deleteEmploye(id) {
            if (!confirm('Supprimer cet employé ?')) return;
            try {
                const res = await apiRequest(`http://localhost:3000/api/employes/${id}`, { method: 'DELETE' });
                if (res.ok) loadEmployes();
                else alert('Erreur');
            } catch (err) { alert('Erreur'); }
        }

        async function editEmploye(id) {
            const emp = employesList.find(e => e.id === id);
            if (!emp) return;
            
            const newNom = prompt('Nouveau nom :', emp.nom);
            if (newNom === null) return;
            const newPrenom = prompt('Nouveau prénom :', emp.prenom);
            const newDirection = prompt('Nouvel ID direction :', emp.direction_id);
            const newEmail = prompt('Nouvel email :', emp.email);
            const newTelephone = prompt('Nouveau téléphone :', emp.telephone);
            
            try {
                const res = await apiRequest(`http://localhost:3000/api/employes/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ 
                        nom: newNom, prenom: newPrenom, direction_id: newDirection,
                        email: newEmail, telephone: newTelephone
                    })
                });
                if (res.ok) loadEmployes();
                else alert('Erreur');
            } catch (err) { alert('Erreur'); }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function loadUserInfo() {
            const currentUser = getUser();
            if (currentUser) {
                document.getElementById('userName').textContent = `${currentUser.prenom || ''} ${currentUser.nom || ''}`.trim() || currentUser.email;
                const roleBadge = document.getElementById('roleBadge');
                if (currentUser.role === 'admin') {
                    roleBadge.textContent = '👑 Administrateur';
                    roleBadge.style.background = 'linear-gradient(135deg,#6c63ff,#a855f7)';
                } else {
                    roleBadge.textContent = '🛡️ Agent de sécurité';
                    roleBadge.style.background = 'linear-gradient(135deg,#06b6d4,#0891b2)';
                }
            }
        }

        loadUserInfo();
        loadDirections();
        loadEmployes();
    </script>
</body>
</html>
